kind = "web"
previewPath = "/"
title = "VoltEdge Battery Store"
version = "1.0.0"
id = "artifacts/battery-store"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21049

[services.development]
run = "pnpm --filter @workspace/battery-store run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/battery-store", "run", "build" ]
publicDir = "artifacts/battery-store/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21049"
BASE_PATH = "/"
